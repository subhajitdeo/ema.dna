name: Calculate EMA Scores

on:
  schedule:
    - cron: '30 11 * * *'  # Daily at 5:00 PM IST
  workflow_dispatch:

permissions:
  contents: write

jobs:
  calculate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout ema.dna
        uses: actions/checkout@v4
        with:
          path: ema.dna
          fetch-depth: 0

      - name: Checkout shape.dna (for data)
        uses: actions/checkout@v4
        with:
          repository: subhajitdeo/shape.dna
          path: shape.dna
          fetch-depth: 0

      - name: Copy data from shape.dna
        run: |
          cd ema.dna
          mkdir -p data/processed
          
          # Copy all JSON files from shape.dna
          if [ -d "../shape.dna/data/processed" ]; then
            cp -r ../shape.dna/data/processed/* data/processed/ 2>/dev/null || true
            echo "✅ Copied JSON files from shape.dna"
          else
            echo "⚠️ No data found in shape.dna"
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd ema.dna
          pip install pandas

      - name: Calculate EMA scores
        run: |
          cd ema.dna
          python calculate_ema_scores.py

      - name: Commit results
        run: |
          cd ema.dna
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add all results
          git add data/scores/ data/results.json
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update EMA scores [skip ci]"
            git push origin main
          fi
