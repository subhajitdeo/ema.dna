name: Update EMA Scanner

on:
  schedule:
    - cron: '30 11 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout ema.dna
        uses: actions/checkout@v4
        with:
          path: ema.dna
          fetch-depth: 0

      - name: Checkout shape.dna (to get data)
        uses: actions/checkout@v4
        with:
          repository: subhajitdeo/shape.dna
          path: shape.dna
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy data from shape.dna to ema.dna
        run: |
          cd ema.dna
          mkdir -p data/processed
          
          # Copy all processed JSON files
          if [ -d "../shape.dna/data/processed" ]; then
            cp -r ../shape.dna/data/processed/* data/processed/
            echo "✅ Copied processed JSON files"
          else
            echo "⚠️ No processed folder found in shape.dna"
          fi
          
          # Also copy nifty500.csv if needed
          if [ -f "../shape.dna/scanner/nifty500.csv" ]; then
            cp ../shape.dna/scanner/nifty500.csv scanner/
            echo "✅ Copied nifty500.csv"
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          cd ema.dna
          pip install pandas

      - name: Run EMA Calculator
        run: |
          cd ema.dna
          python calculate_ema.py

      - name: Commit Results
        run: |
          cd ema.dna
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add data/results.json
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update EMA calculations [skip ci]"
            git push origin main
          fi
